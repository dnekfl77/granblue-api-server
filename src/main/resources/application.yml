server:
  servlet:
    context-path: /api
spring:
  profiles:
    active: local
  application:
    name: granblue-api
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
  data:
    jdbc:
      dialect: postgresql
